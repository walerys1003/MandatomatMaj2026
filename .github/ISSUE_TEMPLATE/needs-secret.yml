name: Needs secret — prośba o sekret/ENV od operatora
description: Agent prosi operatora o dostarczenie sekretu (API key, token, hasło)
title: "[NEEDS-SECRET] <nazwa zmiennej>"
labels: ["needs-secret"]
body:
  - type: markdown
    attributes:
      value: |
        Użyj gdy potrzebujesz sekretu od operatora, by kontynuować zadanie.
        Operator wprowadzi sekret do Vercel ENV / GitHub Secrets / Supabase Vault.

  - type: input
    id: secret_name
    attributes:
      label: Nazwa zmiennej ENV
      placeholder: "ANTHROPIC_API_KEY"
    validations:
      required: true

  - type: dropdown
    id: secret_scope
    attributes:
      label: Gdzie ma być wprowadzony
      options:
        - "Vercel ENV (preview + production)"
        - "Vercel ENV (production only)"
        - "GitHub Actions secret"
        - "Supabase Vault (DB encryption key)"
        - "Lokalny .env.local (development)"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Do czego potrzebny?
      description: Krótko — który endpoint / serwis go używa.
      placeholder: "Endpoint /api/ai/generate-document — wywołanie Anthropic Sonnet 4.6"
    validations:
      required: true

  - type: input
    id: blocking_task
    attributes:
      label: Które zadanie/PR jest zablokowane?
      placeholder: "#42 (T3-AI-098)"

  - type: textarea
    id: instructions
    attributes:
      label: Instrukcja dla operatora — gdzie wziąć ten sekret
      placeholder: |
        1. Anthropic Console → API Keys → Create new key
        2. Skopiuj klucz
        3. Wklej do Vercel ENV jako ANTHROPIC_API_KEY
